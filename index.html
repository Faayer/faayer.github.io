<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faayer AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b141a;
}

/* Header */
.header {
  background: #202c33;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 18px;
}

.credit {
  font-size: 12px;
  color: #aaa;
}

/* Chat */
.chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

/* Messages */
.msg {
  max-width: 70%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

.user {
  background: #005c4b;
  color: white;
  align-self: flex-end;
}

.bot {
  background: #202c33;
  color: white;
  align-self: flex-start;
}

/* Input */
.input-area {
  display: flex;
  position: fixed;
  bottom: 0;
  width: 100%;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
}

button {
  padding: 15px;
  background: #00a884;
  color: white;
  border: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">Faayer AI 🤖</div>
  <div class="credit">made with 💗 by Rajeev</div>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- INPUT -->
<div class="input-area">
  <input id="input" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "sk_qigrzs4x_SvVk6JROcC4vVLeRWgD4W4bE";

function add(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);

  // auto scroll
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();

  if (!text) return;

  add(text, "user");
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Typing...";
  document.getElementById("chat").appendChild(typing);

  try {
    let res = await fetch("https://api.sarvam.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "sarvam-m",
        messages: [{ role: "user", content: text }]
      })
    });

    let data = await res.json();

    typing.remove();

    let reply = data?.choices?.[0]?.message?.content || "No response";

    // REMOVE <think>
    reply = reply.replace(/<think[^>]*>[\s\S]*?<\/think>/gi, "").trim();

    add(reply, "bot");

  } catch (e) {
    typing.remove();
    add("Error ❌", "bot");
  }
}
</script>

</body>
</html>
