<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faayer AI Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b141a;
}

/* Header */
.header {
  background: #202c33;
  color: white;
  padding: 15px;
  font-size: 18px;
}

/* Chat area */
.chat-box {
  height: 85vh;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

/* Messages */
.msg {
  max-width: 75%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  font-size: 14px;
}

.user {
  align-self: flex-end;
  background: #005c4b;
  color: white;
}

.bot {
  align-self: flex-start;
  background: #202c33;
  color: white;
}

/* Input */
.input-area {
  display: flex;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #202c33;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  background: #2a3942;
  color: white;
}

button {
  padding: 15px;
  border: none;
  background: #00a884;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Faayer AI 🤖</div>

<div id="chat" class="chat-box"></div>

<div class="input-area">
  <input id="msg" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = "sk_qigrzs4x_SvVk6JROcC4vVLeRWgD4W4bE";

function addMessage(text, type) {
  let chat = document.getElementById("chat");
  let msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  let input = document.getElementById("msg");
  let message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  // typing indicator
  addMessage("Typing...", "bot");

  try {
    let res = await fetch("https://api.sarvam.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "sarvam-m",
        messages: [{ role: "user", content: message }]
      })
    });

    let data = await res.json();

    // remove typing
    document.getElementById("chat").lastChild.remove();

    let reply = data?.choices?.[0]?.message?.content || "No response";

    // 🔥 remove thinking part
// Remove <think> blocks (all formats)
reply = reply.replace(/<think[^>]*>[\s\S]*?<\/think>/gi, "");

// Remove any leftover tags
reply = reply.replace(/<\/?think>/gi, "");

// Clean extra spaces
reply = reply.trim();

    addMessage(reply, "bot");

  } catch (err) {
    document.getElementById("chat").lastChild.remove();
    addMessage("❌ Error connecting to AI", "bot");
  }
}
</script>

</body>
</html>
